name: Continuous Delivery Frontend Linux

on:
  workflow_dispatch:
  push:
    tags: v*

jobs:
  deploy:
    name: Deploy Web & Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate build
        run: dart run build_runner build

      # Setup for android deployment
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
      - uses: actions/setup-python@v6
        with:
          python-version: 3.12
          cache: 'pip'
          cache-dependency-path: publish/requirements.txt

      - name: Deploy Android
        run: ./scripts/github/deploy-android.sh
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 }}
